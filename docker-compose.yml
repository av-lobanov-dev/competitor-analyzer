services:
  postgres:
    image: postgres:16
    container_name: competitor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: competitor_analyzer
      POSTGRES_USER: competitor_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
  n8n:
    image: n8nio/n8n:latest
    container_name: competitor_n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: competitor_analyzer
      DB_POSTGRESDB_USER: competitor_user
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE}
    volumes:
      - ./n8n/data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      - postgres

  playwright:
    build:
      context: ./playwright
    container_name: competitor_playwright
    restart: unless-stopped
    working_dir: /app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: competitor_analyzer
      POSTGRES_USER: competitor_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      WORKER_INTERVAL_SECONDS: 15
    volumes:
      - ./playwright:/app
      - /app/node_modules
      - ./data:/data
    command: ["sh", "src/queue-runner.sh"]
    depends_on:
      - postgres