services:
  postgres:
    image: postgres:16
    container_name: competitor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: competitor_analyzer
      POSTGRES_USER: competitor_user
      POSTGRES_PASSWORD: competitor_password
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  n8n:
    image: n8nio/n8n:latest
    container_name: competitor_n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: competitor_analyzer
      DB_POSTGRESDB_USER: competitor_user
      DB_POSTGRESDB_PASSWORD: competitor_password
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin_password
    volumes:
      - ./n8n/data:/home/node/.n8n
    ports:
      - "5678:5678"
    depends_on:
      - postgres

  playwright:
    build:
      context: ./playwright
    container_name: competitor_playwright
    restart: unless-stopped
    working_dir: /app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: competitor_analyzer
      POSTGRES_USER: competitor_user
      POSTGRES_PASSWORD: competitor_password
    volumes:
      - ./playwright:/app
      - /app/node_modules
      - ./data:/data
    command: sleep infinity
    depends_on:
      - postgres